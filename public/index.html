<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home Board</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="board">
      <section class="top">
        <div class="clock">
          <div id="time" class="time">--:--</div>
          <div id="date" class="date">Loading</div>
        </div>
        <div class="status-grid">
          <section class="panel weather" aria-label="Weather">
            <div class="panel-label">Weather</div>
            <div id="weather" class="weather-body skeleton"></div>
          </section>
          <section class="panel stocks" aria-label="Stocks">
            <div class="panel-label">Markets</div>
            <div id="stocks" class="stock-list skeleton"></div>
          </section>
        </div>
      </section>

      <section class="main-grid">
        <section class="agenda" aria-label="Calendar">
          <div class="section-head">
            <h1 id="title">Home Board</h1>
            <span id="updated">--</span>
          </div>
          <div id="agenda" class="days"></div>
        </section>

        <aside class="side">
          <section class="panel shopping" aria-label="Shopping">
            <div class="panel-label">Bring!</div>
            <div id="shopping" class="list muted-list">Not connected yet</div>
          </section>
          <section id="errors-panel" class="panel errors hidden" aria-label="Errors">
            <div class="panel-label">Integration issues</div>
            <div id="errors" class="list"></div>
          </section>
        </aside>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
